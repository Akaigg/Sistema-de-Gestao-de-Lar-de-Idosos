<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alimentação — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
</head>
<body>
  <div id="raiz"></div>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, abrirModal, formatarData } from "/estatico/js/comum.js";

    const area = montarLayout({ idPaginaAtiva: "alimentacao", titulo: "Cardápios e Alimentação", subtitulo: "Refeições do lar" });

    const TIPOS = [
      ["cafe_da_manha","Café da manhã"], ["lanche_manha","Lanche manhã"],
      ["almoco","Almoço"], ["lanche_tarde","Lanche tarde"],
      ["jantar","Jantar"], ["ceia","Ceia"],
    ];

    let dia = new Date().toISOString().split("T")[0];

    async function carregar() {
      const lista = await Api.get("/api/alimentacao/cardapios", { dia });
      area.innerHTML = `
        <div class="cartao" style="margin-bottom: var(--esp-6)">
          <div class="cartao__cabecalho">
            <div class="flex gap-3 alinhar-centro">
              <label>Dia:</label>
              <input id="dia" type="date" value="${dia}" style="padding:.45rem .7rem; border:1px solid var(--borda-forte); border-radius:6px">
            </div>
            <button class="botao botao--pequeno" id="btn-novo">+ Novo item de cardápio</button>
          </div>
          <div class="grade grade-3" style="margin-top: var(--esp-4)">
            ${TIPOS.map(([chave, rotulo]) => {
              const itens = lista.filter(c => c.tipo_refeicao === chave);
              return `
                <div class="cartao cartao--compacto">
                  <strong>${rotulo}</strong>
                  ${itens.length === 0 ? '<p style="color:var(--texto-suave)">Sem itens</p>' : itens.map(c => `
                    <p>${escaparHTML(c.descricao)}${c.calorias_aproximadas ? " · "+c.calorias_aproximadas+" kcal" : ""}</p>
                  `).join("")}
                </div>`;
            }).join("")}
          </div>
        </div>
      `;
      document.getElementById("dia").addEventListener("change", e => { dia = e.target.value; carregar(); });
      document.getElementById("btn-novo").addEventListener("click", novoItem);
    }

    async function novoItem() {
      await abrirModal({
        titulo: "Novo item de cardápio",
        textoConfirmar: "Adicionar",
        conteudoHtml: `<form id="f">
          <div class="campo"><label>Data</label><input type="date" name="data_referencia" value="${dia}" required></div>
          <div class="campo"><label>Refeição</label>
            <select name="tipo_refeicao">${TIPOS.map(([v,r]) => `<option value="${v}">${r}</option>`).join("")}</select>
          </div>
          <div class="campo"><label>Descrição</label><textarea name="descricao" required></textarea></div>
          <div class="campo"><label>Calorias aproximadas</label><input name="calorias_aproximadas" type="number"></div>
        </form>`,
        aoConfirmar: async (f) => {
          const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
          if (dados.calorias_aproximadas) dados.calorias_aproximadas = parseInt(dados.calorias_aproximadas);
          else delete dados.calorias_aproximadas;
          try { await Api.post("/api/alimentacao/cardapios", dados); notificar("Adicionado.", "sucesso"); carregar(); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    carregar();
  </script>
</body>
</html>
