<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consultas — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
  <link rel="stylesheet" href="/estatico/css/calendario.css">
</head>
<body>
  <div id="raiz"></div>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, abrirModal, formatarDataHora } from "/estatico/js/comum.js";

    const area = montarLayout({
      idPaginaAtiva: "consultas",
      titulo: "Agenda de consultas",
      subtitulo: "Consultas internas e externas",
    });

    let residentes = [];
    async function carregar() {
      const lista = await Api.get("/api/residentes", { apenas_ativos: true, tamanho_pagina: 200 });
      residentes = lista.itens;

      area.innerHTML = `
        <div class="cartao" style="margin-bottom: var(--esp-6)">
          <div class="cartao__cabecalho">
            <h3>Agenda</h3>
            <button class="botao botao--pequeno" id="btn-novo">+ Novo agendamento</button>
          </div>
        </div>
        <div class="cartao" style="padding: var(--esp-4)"><div id="cal"></div></div>
      `;

      document.getElementById("btn-novo").addEventListener("click", abrirNova);

      const cal = new FullCalendar.Calendar(document.getElementById("cal"), {
        initialView: "dayGridMonth",
        locale: "pt-br",
        height: 700,
        headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek,listWeek" },
        buttonText: { today: "Hoje", month: "Mês", week: "Semana", list: "Lista" },
        events: async (info, ok, fail) => {
          try {
            const r = await Api.get("/api/prontuario/consultas", { inicio: info.startStr, fim: info.endStr });
            ok(r.map(c => ({
              id: c.identificador,
              title: `${c.tipo} · ${c.profissional}`,
              start: c.data_hora,
              color: c.status === "cancelada" ? "#94a3b8" : "#2563eb",
              extendedProps: c,
            })));
          } catch (e) { fail(e); }
        },
        eventClick: (info) => abrirDetalhe(info.event),
      });
      cal.render();

      async function abrirNova() {
        await abrirModal({
          titulo: "Novo agendamento",
          textoConfirmar: "Agendar",
          conteudoHtml: `<form id="f">
            <div class="grade grade-2">
              <div class="campo"><label>Residente</label>
                <select name="residente_id" required>${residentes.map(r => `<option value="${r.identificador}">${escaparHTML(r.nome_completo)}</option>`).join("")}</select>
              </div>
              <div class="campo"><label>Tipo</label>
                <select name="tipo">
                  <option value="consulta_medica">Consulta médica</option>
                  <option value="exame">Exame</option>
                  <option value="procedimento">Procedimento</option>
                  <option value="fisioterapia">Fisioterapia</option>
                  <option value="odontologia">Odontologia</option>
                  <option value="psicologia">Psicologia</option>
                  <option value="nutricao">Nutrição</option>
                </select>
              </div>
              <div class="campo"><label>Data e hora</label><input type="datetime-local" name="data_hora" required></div>
              <div class="campo"><label>Profissional</label><input name="profissional" required></div>
              <div class="campo"><label>Especialidade</label><input name="especialidade"></div>
              <div class="campo"><label>Local</label><input name="local"></div>
            </div>
            <div class="campo campo--horizontal"><input type="checkbox" name="eh_externa" id="ex"><label for="ex">É externa</label></div>
            <div class="campo"><label>Motivo</label><textarea name="motivo"></textarea></div>
          </form>`,
          aoConfirmar: async (f) => {
            const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
            dados.residente_id = parseInt(dados.residente_id);
            dados.eh_externa = f.querySelector("[name=eh_externa]").checked;
            try { await Api.post("/api/prontuario/consultas", dados); notificar("Agendada.", "sucesso"); cal.refetchEvents(); return true; }
            catch (e) { notificar(e.message, "perigo"); return false; }
          },
        });
      }

      async function abrirDetalhe(ev) {
        const c = ev.extendedProps;
        await abrirModal({
          titulo: "Detalhes da consulta",
          textoConfirmar: "Cancelar consulta",
          conteudoHtml: `
            <p><strong>Tipo:</strong> ${escaparHTML(c.tipo)}</p>
            <p><strong>Profissional:</strong> ${escaparHTML(c.profissional)} ${c.especialidade ? "("+escaparHTML(c.especialidade)+")" : ""}</p>
            <p><strong>Data/hora:</strong> ${formatarDataHora(c.data_hora)}</p>
            <p><strong>Local:</strong> ${escaparHTML(c.local || "—")}</p>
            <p><strong>Status:</strong> ${escaparHTML(c.status)}</p>
            <p><strong>Motivo:</strong> ${escaparHTML(c.motivo || "—")}</p>
            ${c.status === "cancelada" ? "<p><em>Já cancelada.</em></p>" : `<div class="campo"><label>Motivo do cancelamento</label><input id="motivo-cancel"></div>`}
          `,
          aoConfirmar: async (f) => {
            if (c.status === "cancelada") return true;
            const motivo = f.querySelector("#motivo-cancel").value;
            if (!motivo) { notificar("Informe o motivo.", "aviso"); return false; }
            try { await Api.post(`/api/prontuario/consultas/${c.identificador}/cancelar`, { motivo }); notificar("Cancelada.", "info"); cal.refetchEvents(); return true; }
            catch (e) { notificar(e.message, "perigo"); return false; }
          },
        });
      }
    }

    carregar();
  </script>
</body>
</html>
