<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medicação — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
  <link rel="stylesheet" href="/estatico/css/calendario.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
</head>
<body>
  <div id="raiz"></div>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, abrirModal, formatarDataHora } from "/estatico/js/comum.js";

    const area = montarLayout({
      idPaginaAtiva: "medicacao",
      titulo: "Medicação",
      subtitulo: "Calendário interativo · Prescrições e aplicações",
    });

    let residenteSelecionado = "";
    let residentes = [];

    async function carregar() {
      area.innerHTML = '<div class="carregando"></div> Carregando...';
      try {
        const lista = await Api.get("/api/residentes", { apenas_ativos: true, tamanho_pagina: 200 });
        residentes = lista.itens;
      } catch (e) { notificar(e.message, "perigo"); }

      area.innerHTML = `
        <div class="cartao" style="margin-bottom: var(--esp-6)">
          <div class="cartao__cabecalho">
            <div style="display: flex; gap: var(--esp-3); align-items: center; flex-wrap: wrap">
              <label style="font-weight:600; color: var(--texto-secundario)">Residente:</label>
              <select id="filtro-residente" style="padding: 0.5rem 0.85rem; border:1px solid var(--borda-forte); border-radius: var(--raio-md); min-width: 280px">
                <option value="">Todos os residentes</option>
                ${residentes.map(r => `<option value="${r.identificador}">${escaparHTML(r.nome_completo)}</option>`).join("")}
              </select>
            </div>
            <div style="display:flex; gap: var(--esp-2)">
              <button class="botao botao--secundario botao--pequeno" id="btn-marcar-atrasos">Atualizar atrasos</button>
              <button class="botao botao--pequeno" id="btn-nova-prescricao">+ Nova prescrição</button>
              <button class="botao botao--secundario botao--pequeno" id="btn-novo-medicamento">+ Medicamento</button>
            </div>
          </div>
          <div class="legenda-calendario">
            <div class="item"><span class="bola" style="background:#16a34a"></span> Aplicado</div>
            <div class="item"><span class="bola" style="background:#f59e0b"></span> Aplicado com atraso</div>
            <div class="item"><span class="bola" style="background:#dc2626"></span> Em atraso</div>
            <div class="item"><span class="bola" style="background:#94a3b8"></span> Aguardando</div>
            <div class="item"><span class="bola" style="background:#475569"></span> Recusado</div>
            <div class="item"><span class="bola" style="background:#7c3aed"></span> Reação adversa</div>
          </div>
        </div>

        <div class="cartao" style="padding: var(--esp-4)">
          <div id="calendario"></div>
        </div>
      `;

      document.getElementById("filtro-residente").addEventListener("change", (e) => {
        residenteSelecionado = e.target.value;
        calendario.refetchEvents();
      });
      document.getElementById("btn-marcar-atrasos").addEventListener("click", marcarAtrasos);
      document.getElementById("btn-nova-prescricao").addEventListener("click", abrirNovaPrescricao);
      document.getElementById("btn-novo-medicamento").addEventListener("click", abrirNovoMedicamento);

      iniciarCalendario();
    }

    let calendario;
    function iniciarCalendario() {
      calendario = new FullCalendar.Calendar(document.getElementById("calendario"), {
        initialView: "timeGridWeek",
        locale: "pt-br",
        height: 700,
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay,listWeek",
        },
        buttonText: { today: "Hoje", month: "Mês", week: "Semana", day: "Dia", list: "Lista" },
        slotMinTime: "05:00:00",
        slotMaxTime: "23:00:00",
        nowIndicator: true,
        events: async (info, sucesso, falha) => {
          try {
            const eventos = await Api.get("/api/medicacao/aplicacoes", {
              inicio: info.startStr, fim: info.endStr,
              residente_id: residenteSelecionado || undefined,
            });
            sucesso(eventos);
          } catch (e) { notificar(e.message, "perigo"); falha(e); }
        },
        eventClick: (info) => abrirDetalheAplicacao(info.event),
      });
      calendario.render();
    }

    async function marcarAtrasos() {
      const r = await Api.post("/api/medicacao/aplicacoes/marcar-atrasadas");
      notificar(`${r.marcadas} aplicação(ões) marcada(s) como em atraso.`, "info");
      calendario.refetchEvents();
    }

    async function abrirDetalheAplicacao(evento) {
      const props = evento.extendedProps;
      const id = evento.id;
      await abrirModal({
        titulo: evento.title,
        textoConfirmar: "Aplicar agora",
        conteudoHtml: `
          <p><strong>Horário previsto:</strong> ${formatarDataHora(evento.start.toISOString())}</p>
          <p><strong>Status:</strong> <span class="pilula">${props.status}</span></p>
          ${props.horario_aplicado ? `<p><strong>Aplicado em:</strong> ${formatarDataHora(props.horario_aplicado)}</p>` : ""}
          <hr>
          <div class="campo"><label>Observações</label><textarea id="obs-app"></textarea></div>
          <div class="flex gap-3">
            <button class="botao botao--perigo" id="btn-recusar">Recusou</button>
            <button class="botao" style="background:#7c3aed" id="btn-reacao">Reação adversa</button>
          </div>
        `,
        aoConfirmar: async (modal) => {
          const observacoes = modal.querySelector("#obs-app").value;
          try {
            await Api.post(`/api/medicacao/aplicacoes/${id}/registrar`, { acao: "aplicar", observacoes });
            notificar("Aplicação registrada.", "sucesso");
            calendario.refetchEvents();
            return true;
          } catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });

      // Anexa cliques aos botões dentro do modal
      setTimeout(() => {
        const modalAberto = document.querySelector(".fundo-modal");
        if (!modalAberto) return;
        modalAberto.querySelector("#btn-recusar")?.addEventListener("click", async () => {
          const motivo = prompt("Motivo da recusa:");
          if (!motivo) return;
          try {
            await Api.post(`/api/medicacao/aplicacoes/${id}/registrar`, { acao: "recusar", motivo_recusa: motivo });
            notificar("Recusa registrada.", "info");
            calendario.refetchEvents();
            modalAberto.remove();
          } catch (e) { notificar(e.message, "perigo"); }
        });
        modalAberto.querySelector("#btn-reacao")?.addEventListener("click", async () => {
          const descricao = prompt("Descreva a reação adversa:");
          if (!descricao) return;
          try {
            await Api.post(`/api/medicacao/aplicacoes/${id}/registrar`, { acao: "reacao", descricao_reacao: descricao });
            notificar("Reação registrada.", "aviso");
            calendario.refetchEvents();
            modalAberto.remove();
          } catch (e) { notificar(e.message, "perigo"); }
        });
      }, 100);
    }

    async function abrirNovaPrescricao() {
      const medicamentos = await Api.get("/api/medicacao/medicamentos");
      await abrirModal({
        titulo: "Nova prescrição",
        larguraGrande: true,
        textoConfirmar: "Prescrever",
        conteudoHtml: `<form id="f">
          <div class="grade grade-2">
            <div class="campo"><label>Residente *</label>
              <select name="residente_id" required>
                ${residentes.map(r => `<option value="${r.identificador}">${escaparHTML(r.nome_completo)}</option>`).join("")}
              </select>
            </div>
            <div class="campo"><label>Medicamento *</label>
              <select name="medicamento_id" required>
                ${medicamentos.map(m => `<option value="${m.identificador}">${escaparHTML(m.nome_comercial)} ${escaparHTML(m.concentracao)}</option>`).join("")}
              </select>
            </div>
            <div class="campo"><label>Dose *</label><input name="dose" required placeholder="1 comprimido"></div>
            <div class="campo"><label>Via *</label>
              <select name="via">
                <option value="oral">Oral</option><option value="sublingual">Sublingual</option>
                <option value="topica">Tópica</option><option value="subcutanea">Subcutânea</option>
                <option value="intramuscular">Intramuscular</option><option value="intravenosa">Intravenosa</option>
                <option value="inalatoria">Inalatória</option>
              </select>
            </div>
            <div class="campo"><label>Frequência (horas) *</label><input name="frequencia_horas" type="number" min="1" max="24" value="8" required></div>
            <div class="campo"><label>Horários (separados por vírgula) *</label><input name="horarios" required placeholder="08:00,14:00,20:00"></div>
            <div class="campo"><label>Data de início *</label><input name="data_inicio" type="date" required value="${new Date().toISOString().split('T')[0]}"></div>
            <div class="campo"><label>Duração (dias)</label><input name="duracao_dias" type="number" placeholder="Deixe vazio para contínuo"></div>
          </div>
          <div class="campo campo--horizontal">
            <input type="checkbox" name="se_necessario" id="sn"><label for="sn">Se necessário (SOS)</label>
          </div>
          <div class="campo"><label>Observações</label><textarea name="observacoes"></textarea></div>
        </form>`,
        aoConfirmar: async (f) => {
          const form = f.querySelector("#f");
          const dados = Object.fromEntries(new FormData(form));
          const usuario = JSON.parse(localStorage.getItem("cuidarmais_usuario"));
          dados.residente_id = parseInt(dados.residente_id);
          dados.medicamento_id = parseInt(dados.medicamento_id);
          dados.medico_id = usuario.identificador;
          dados.frequencia_horas = parseInt(dados.frequencia_horas);
          dados.horarios = dados.horarios.split(",").map(s => s.trim());
          if (dados.duracao_dias) dados.duracao_dias = parseInt(dados.duracao_dias); else delete dados.duracao_dias;
          dados.se_necessario = form.se_necessario.checked;
          try { await Api.post("/api/medicacao/prescricoes", dados); notificar("Prescrição criada.", "sucesso"); calendario.refetchEvents(); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    async function abrirNovoMedicamento() {
      await abrirModal({
        titulo: "Novo medicamento",
        textoConfirmar: "Cadastrar",
        conteudoHtml: `<form id="f">
          <div class="grade grade-2">
            <div class="campo"><label>Nome comercial</label><input name="nome_comercial" required></div>
            <div class="campo"><label>Princípio ativo</label><input name="principio_ativo" required></div>
            <div class="campo"><label>Forma farmacêutica</label><input name="forma_farmaceutica" required placeholder="Comprimido, xarope..."></div>
            <div class="campo"><label>Concentração</label><input name="concentracao" required placeholder="500mg"></div>
            <div class="campo"><label>Fabricante</label><input name="fabricante"></div>
            <div class="campo"><label>Estoque mínimo</label><input name="estoque_minimo" type="number" value="10"></div>
          </div>
          <div class="campo campo--horizontal">
            <input type="checkbox" name="controlado" id="ct"><label for="ct">Medicamento controlado</label>
          </div>
        </form>`,
        aoConfirmar: async (f) => {
          const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
          dados.controlado = f.querySelector("[name=controlado]").checked;
          dados.necessita_receita = true;
          dados.estoque_minimo = parseInt(dados.estoque_minimo || 10);
          try { await Api.post("/api/medicacao/medicamentos", dados); notificar("Medicamento cadastrado.", "sucesso"); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    carregar();
  </script>
</body>
</html>
