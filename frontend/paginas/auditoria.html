<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditoria — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
</head>
<body>
  <div id="raiz"></div>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, formatarDataHora } from "/estatico/js/comum.js";

    const area = montarLayout({ idPaginaAtiva: "auditoria", titulo: "Auditoria", subtitulo: "Trilha de ações (apenas admin)" });

    let recursoFiltro = "";
    let pagina = 1;

    async function carregar() {
      try {
        const itens = await Api.get("/api/auditoria", { recurso: recursoFiltro || undefined, pagina, tamanho_pagina: 100 });
        area.innerHTML = `
          <div class="cartao">
            <div class="cartao__cabecalho">
              <div class="flex gap-3 alinhar-centro">
                <label>Recurso:</label>
                <input id="filtro" placeholder="ex.: residente, funcionario" value="${escaparHTML(recursoFiltro)}"
                       style="padding:.45rem .7rem; border:1px solid var(--borda-forte); border-radius:6px">
              </div>
              <div class="flex gap-2">
                <button class="botao botao--pequeno botao--secundario" id="ant">‹ Anterior</button>
                <button class="botao botao--pequeno botao--secundario" id="prox">Próxima ›</button>
              </div>
            </div>
            <table class="tabela">
              <thead><tr><th>Quando</th><th>Ação</th><th>Recurso</th><th>ID</th><th>Funcionário</th><th>IP</th><th>Detalhes</th></tr></thead>
              <tbody>${itens.map(i => `
                <tr>
                  <td>${formatarDataHora(i.ocorrido_em)}</td>
                  <td><span class="pilula">${escaparHTML(i.acao)}</span></td>
                  <td>${escaparHTML(i.recurso)}</td>
                  <td>${i.recurso_id ?? "—"}</td>
                  <td>${i.funcionario_id ?? "—"}</td>
                  <td><small>${escaparHTML(i.endereco_ip || "—")}</small></td>
                  <td><small>${escaparHTML(i.detalhes || "")}</small></td>
                </tr>`).join("")}</tbody>
            </table>
            <p style="text-align:right; color:var(--texto-suave)">Página ${pagina}</p>
          </div>
        `;
        const filtro = document.getElementById("filtro");
        let timeout;
        filtro.addEventListener("input", () => {
          clearTimeout(timeout);
          timeout = setTimeout(() => { recursoFiltro = filtro.value; pagina = 1; carregar(); }, 350);
        });
        document.getElementById("ant").addEventListener("click", () => { if (pagina > 1) { pagina--; carregar(); } });
        document.getElementById("prox").addEventListener("click", () => { pagina++; carregar(); });
      } catch (e) { notificar(e.message, "perigo"); }
    }

    carregar();
  </script>
</body>
</html>
