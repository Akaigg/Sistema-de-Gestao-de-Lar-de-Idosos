<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quartos — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
  <style>
    .grade-quartos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--esp-4); }
    .quarto { padding: var(--esp-4); border: 1px solid var(--borda-padrao); border-radius: var(--raio-lg); background: var(--fundo-cartao); }
    .leito { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.65rem; border-radius: var(--raio-sm); margin-top: 0.4rem; background: var(--fundo-sutil); }
    .leito--livre  { border-left: 4px solid var(--cor-sucesso); }
    .leito--ocupado{ border-left: 4px solid var(--cor-perigo); }
    .leito--higi   { border-left: 4px solid var(--cor-aviso); }
  </style>
</head>
<body>
  <div id="raiz"></div>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, abrirModal, confirmar } from "/estatico/js/comum.js";

    const area = montarLayout({ idPaginaAtiva: "quartos", titulo: "Mapa de Quartos", subtitulo: "Alocação e ocupação" });

    let quartos = [], residentes = [];

    async function carregar() {
      [quartos, residentes] = await Promise.all([
        Api.get("/api/quartos"),
        Api.get("/api/residentes", { tamanho_pagina: 200 }).then(r => r.itens),
      ]);
      renderizar();
    }

    function renderizar() {
      area.innerHTML = `
        <div class="cartao" style="margin-bottom: var(--esp-6)">
          <div class="cartao__cabecalho">
            <h3>Quartos cadastrados (${quartos.length})</h3>
            <button class="botao" id="btn-novo">+ Novo quarto</button>
          </div>
        </div>
        <div class="grade-quartos">
          ${quartos.map(q => `
            <div class="quarto">
              <div style="display:flex; justify-content: space-between; align-items: center">
                <strong>Quarto ${escaparHTML(q.numero)}</strong>
                <span class="pilula">${escaparHTML(q.tipo)}</span>
              </div>
              <small style="color: var(--texto-suave)">${q.andar}º andar · ${q.leitos.length} leito(s)</small>
              <div style="margin-top: var(--esp-3)">
                ${q.leitos.map(l => `
                  <div class="leito leito--${l.status === "livre" ? "livre" : l.status === "ocupado" ? "ocupado" : "higi"}">
                    <div>
                      <strong>Leito ${escaparHTML(l.numero)}</strong>
                      <br><small>${l.status} ${l.residente_id ? "· Residente #" + l.residente_id : ""}</small>
                    </div>
                    <div style="display:flex; gap: 4px">
                      ${l.residente_id ? `<button class="botao botao--pequeno botao--perigo" data-acao="liberar" data-id="${l.identificador}">Liberar</button>` : `<button class="botao botao--pequeno" data-acao="alocar" data-id="${l.identificador}">Alocar</button>`}
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
      document.getElementById("btn-novo").addEventListener("click", abrirNovoQuarto);
      area.querySelectorAll("[data-acao]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const acao = btn.dataset.acao;
          const leitoId = btn.dataset.id;
          if (acao === "liberar") {
            if (await confirmar("Liberar este leito?")) {
              try { await Api.post(`/api/quartos/leitos/${leitoId}/liberar`); notificar("Leito liberado.", "sucesso"); carregar(); }
              catch (e) { notificar(e.message, "perigo"); }
            }
          } else {
            await abrirModal({
              titulo: "Alocar residente",
              textoConfirmar: "Alocar",
              conteudoHtml: `<div class="campo"><label>Residente</label>
                <select id="r-select">${residentes.map(r => `<option value="${r.identificador}">${escaparHTML(r.nome_completo)}</option>`).join("")}</select>
              </div>`,
              aoConfirmar: async (f) => {
                const id = parseInt(f.querySelector("#r-select").value);
                try { await Api.post(`/api/quartos/leitos/${leitoId}/alocar`, { residente_id: id }); notificar("Alocado.", "sucesso"); carregar(); return true; }
                catch (e) { notificar(e.message, "perigo"); return false; }
              },
            });
          }
        });
      });
    }

    async function abrirNovoQuarto() {
      await abrirModal({
        titulo: "Novo quarto",
        textoConfirmar: "Cadastrar",
        conteudoHtml: `<form id="f">
          <div class="grade grade-2">
            <div class="campo"><label>Número</label><input name="numero" required></div>
            <div class="campo"><label>Andar</label><input name="andar" type="number" value="0"></div>
            <div class="campo"><label>Tipo</label>
              <select name="tipo">
                <option value="individual">Individual</option>
                <option value="duplo">Duplo</option>
                <option value="triplo">Triplo</option>
                <option value="enfermaria">Enfermaria</option>
              </select>
            </div>
            <div class="campo"><label>Capacidade</label><input name="capacidade" type="number" value="1" min="1" max="10"></div>
            <div class="campo"><label>Números dos leitos (vírgula)</label><input name="leitos" placeholder="A,B"></div>
          </div>
          <div class="campo campo--horizontal"><input type="checkbox" name="banheiro" id="bn" checked><label for="bn">Possui banheiro</label></div>
          <div class="campo campo--horizontal"><input type="checkbox" name="ar" id="ar"><label for="ar">Ar-condicionado</label></div>
        </form>`,
        aoConfirmar: async (f) => {
          const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
          const payload = {
            numero: dados.numero,
            andar: parseInt(dados.andar || 0),
            tipo: dados.tipo,
            capacidade: parseInt(dados.capacidade),
            leitos: (dados.leitos || "").split(",").map(s => s.trim()).filter(Boolean),
            possui_banheiro: f.querySelector("[name=banheiro]").checked,
            possui_ar_condicionado: f.querySelector("[name=ar]").checked,
          };
          try { await Api.post("/api/quartos", payload); notificar("Quarto cadastrado.", "sucesso"); carregar(); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    carregar();
  </script>
</body>
</html>
