<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escalas — Cuidar+</title>
  <link rel="stylesheet" href="/estatico/css/design-system.css">
  <link rel="stylesheet" href="/estatico/css/layout.css">
  <link rel="stylesheet" href="/estatico/css/calendario.css">
</head>
<body>
  <div id="raiz"></div>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module">
    import { Api } from "/estatico/js/api.js";
    import { montarLayout, notificar, escaparHTML, abrirModal, formatarDataHora } from "/estatico/js/comum.js";

    const area = montarLayout({ idPaginaAtiva: "escalas", titulo: "Escalas de Cuidadores", subtitulo: "Planejamento de turnos" });

    let funcionarios = [];
    let escalas = [];
    let escalaSelecionada = null;
    const hoje = new Date();
    let mes = hoje.getMonth() + 1, ano = hoje.getFullYear();

    async function carregar() {
      area.innerHTML = '<div class="carregando"></div> Carregando...';
      try {
        const lista = await Api.get("/api/funcionarios", { tamanho_pagina: 200 });
        funcionarios = lista.itens;
        escalas = await Api.get("/api/escalas", { mes, ano });
        escalaSelecionada = escalas[0] || null;
      } catch (e) { notificar(e.message, "perigo"); return; }
      renderizar();
    }

    function renderizar() {
      area.innerHTML = `
        <div class="cartao" style="margin-bottom: var(--esp-6)">
          <div class="cartao__cabecalho">
            <div class="flex gap-3 alinhar-centro">
              <select id="sel-mes" style="padding: 0.45rem 0.7rem; border:1px solid var(--borda-forte); border-radius:6px">
                ${Array.from({length:12}, (_,i) => `<option value="${i+1}" ${i+1===mes?"selected":""}>${new Date(2000,i,1).toLocaleString("pt-BR",{month:"long"})}</option>`).join("")}
              </select>
              <input id="ano" type="number" value="${ano}" min="2020" max="2100"
                     style="padding: 0.45rem 0.7rem; border:1px solid var(--borda-forte); border-radius:6px; width:120px">
              <select id="sel-escala" style="padding: 0.45rem 0.7rem; border:1px solid var(--borda-forte); border-radius:6px">
                ${escalas.map(e => `<option value="${e.identificador}" ${escalaSelecionada && e.identificador===escalaSelecionada.identificador?"selected":""}>${escaparHTML(e.setor)}</option>`).join("")}
              </select>
            </div>
            <div class="flex gap-2">
              <button class="botao botao--secundario botao--pequeno" id="btn-nova-escala">+ Nova escala</button>
              ${escalaSelecionada ? '<button class="botao botao--pequeno" id="btn-turno">+ Atribuir turno</button>' : ''}
            </div>
          </div>
        </div>
        <div class="cartao" style="padding: var(--esp-4)"><div id="cal"></div></div>
      `;

      document.getElementById("sel-mes").addEventListener("change", e => { mes = parseInt(e.target.value); carregar(); });
      document.getElementById("ano").addEventListener("change", e => { ano = parseInt(e.target.value); carregar(); });
      document.getElementById("sel-escala")?.addEventListener("change", e => {
        escalaSelecionada = escalas.find(x => x.identificador === parseInt(e.target.value));
        renderizar();
      });
      document.getElementById("btn-nova-escala").addEventListener("click", abrirNovaEscala);
      document.getElementById("btn-turno")?.addEventListener("click", abrirNovoTurno);

      const cal = new FullCalendar.Calendar(document.getElementById("cal"), {
        initialView: "timeGridWeek",
        locale: "pt-br",
        height: 680,
        slotMinTime: "00:00:00", slotMaxTime: "24:00:00",
        events: escalaSelecionada ? escalaSelecionada.turnos.map(t => {
          const f = funcionarios.find(x => x.identificador === t.funcionario_id);
          return {
            id: t.identificador,
            title: f ? f.nome_completo : "Funcionário #" + t.funcionario_id,
            start: t.inicio, end: t.fim,
            color: t.tipo === "noite" ? "#1e293b" : t.tipo === "tarde" ? "#f59e0b" : t.tipo === "manha" ? "#16a34a" : "#0e7490",
          };
        }) : [],
        headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek,listWeek" },
        buttonText: { today: "Hoje", month: "Mês", week: "Semana", list: "Lista" },
      });
      cal.render();
    }

    async function abrirNovaEscala() {
      await abrirModal({
        titulo: "Nova escala",
        textoConfirmar: "Criar",
        conteudoHtml: `<form id="f">
          <div class="grade grade-2">
            <div class="campo"><label>Mês</label><input type="number" name="referencia_mes" min="1" max="12" value="${mes}" required></div>
            <div class="campo"><label>Ano</label><input type="number" name="referencia_ano" min="2020" max="2100" value="${ano}" required></div>
          </div>
          <div class="campo"><label>Setor</label><input name="setor" required placeholder="Ex.: Cuidadores Piso 1"></div>
        </form>`,
        aoConfirmar: async (f) => {
          const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
          dados.referencia_mes = parseInt(dados.referencia_mes);
          dados.referencia_ano = parseInt(dados.referencia_ano);
          try { await Api.post("/api/escalas", dados); notificar("Escala criada.", "sucesso"); carregar(); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    async function abrirNovoTurno() {
      await abrirModal({
        titulo: "Atribuir turno",
        textoConfirmar: "Atribuir",
        conteudoHtml: `<form id="f">
          <div class="campo"><label>Funcionário</label>
            <select name="funcionario_id">
              ${funcionarios.map(f => `<option value="${f.identificador}">${escaparHTML(f.nome_completo)}</option>`).join("")}
            </select>
          </div>
          <div class="grade grade-2">
            <div class="campo"><label>Início</label><input type="datetime-local" name="inicio" required></div>
            <div class="campo"><label>Fim</label><input type="datetime-local" name="fim" required></div>
          </div>
          <div class="campo"><label>Tipo</label>
            <select name="tipo">
              <option value="manha">Manhã</option><option value="tarde">Tarde</option>
              <option value="noite">Noite</option>
              <option value="plantao_12h">Plantão 12h</option>
              <option value="plantao_24h">Plantão 24h</option>
            </select>
          </div>
          <div class="campo"><label>Observações</label><input name="observacoes"></div>
        </form>`,
        aoConfirmar: async (f) => {
          const dados = Object.fromEntries(new FormData(f.querySelector("#f")));
          dados.funcionario_id = parseInt(dados.funcionario_id);
          try { await Api.post(`/api/escalas/${escalaSelecionada.identificador}/turnos`, dados); notificar("Turno atribuído.", "sucesso"); carregar(); return true; }
          catch (e) { notificar(e.message, "perigo"); return false; }
        },
      });
    }

    carregar();
  </script>
</body>
</html>
